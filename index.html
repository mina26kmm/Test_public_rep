<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Proste Obliczenia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #wynik {
            font-size: 2rem;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Wynik działania 2 + 2 to:</h1>
        <div id="wynik">Obliczanie...</div>
    </div>

    <script>
        // Deklarujemy liczby
        const a = 2;
        const b = 2;
        
        // Wykonujemy działanie
        const suma = a + b;

        // Znajdujemy element na stronie i wstawiamy do niego wynik
        document.getElementById('wynik').innerText = suma;
        
        // Dodatkowo wypiszemy to w konsoli przeglądarki (F12)
        console.log("Wynik działania to: " + suma);
    </script>

</body>
</html>
